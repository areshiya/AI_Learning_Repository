<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI Knowledge Starfield - Legacy Edition</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/lib/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">

    <style>
        body { margin: 0; background: #06080b; color: #fff; overflow: hidden; font-family: 'Consolas', 'Monaco', 'monospace', sans-serif; }
        
        /* 🔥 视觉调整：更深邃的 Submachine 风格径向渐变背景 */
        #starfield { 
            width: 100vw; height: 100vh; 
            background: radial-gradient(circle at center, #10151c 0%, #030406 100%);
        }

        /* 游戏化 UI 控件 */
        .controls { position: fixed; left: 20px; bottom: 20px; z-index: 100; display: flex; gap: 10px; }
        .btn { 
            background: rgba(0,255,255,0.02); border: 1px solid rgba(0,255,255,0.1); 
            color: #4db6ac; padding: 10px 20px; border-radius: 4px; cursor: pointer; /* 去掉大圆角，改为 Submachine 风格小圆角 */
            backdrop-filter: blur(5px); transition: all 0.3s;
            font-size: 13px;
        }
        .btn:hover { background: rgba(0, 255, 255, 0.1); border-color: #00e5ff; color: #fff; text-shadow: 0 0 5px #00e5ff; }

        /* 侧边笔记面板 */
        #sidePanel { 
            position: fixed; right: -500px; top: 0; width: 450px; height: 100%;
            background: rgba(6, 10, 15, 0.9); backdrop-filter: blur(15px);
            border-left: 1px solid rgba(0,255,255,0.05); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }
        #sidePanel.active { right: 0; }
        .markdown-body { padding: 40px; height: 100%; overflow-y: auto; background: transparent !important; color: #a3b3bf !important; font-size: 14px; }
        .close-btn { position: absolute; top: 20px; left: -40px; background: #06080b; padding: 10px; cursor: pointer; border-radius: 4px 0 0 4px; border: 1px solid rgba(0,255,255,0.1); color: #4db6ac; }
        .close-btn:hover { color: #fff; border-color: #00e5ff; }
    </style>
</head>
<body>

    <div id="starfield"></div>

    <div class="controls">
        <button class="btn" onclick="resetCamera()">[🎯] RE-CENTER</button>
        <button class="btn" onclick="location.reload()">[🔄] UPDATE MAP</button>
    </div>

    <div id="sidePanel">
        <div class="close-btn" onclick="togglePanel(false)">✕</div>
        <div id="mdContent" class="markdown-body"></div>
    </div>

    <script>
        let network = null;
        let nodes = new vis.DataSet();
        let edges = new vis.DataSet();
        let firstNodeId = null; //记录第一个文件的 ID

        // 核心管理
        const basePositions = {};    // 记录普通节点晃动的中心点
        const wobblingNodes = new Set(); // 记录普通哪些节点正在摆动
        let draggingNodeId = null;   // 正在被拖拽的节点 ID
        let wobbleStep = 0;

        async function startEngine() {
        try {
            const listRes = await fetch('list.json');
            if (!listRes.ok) throw new Error('无法读取 list.json');
            const files = await listRes.json();

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const res = await fetch(`notes/${file}`);
                const text = await res.text();
                const part = text.match(/^---\r?\n([\s\S]+?)\r?\n---/);
                
                if (part) {
                    try {
                        const meta = jsyaml.load(part[1]);
                        const isFixed = meta.status === 'fixed';
                        const nodeId = meta.id || file;

                        if (i === 0) {
                            firstNodeId = nodeId;
                        }

                        nodes.add({
                            id: meta.id || file,
                            label: isFixed ? `${meta.label || file}` : (meta.label || file), // 固定节点加括号装饰
                            file: file,
                            fixed: isFixed, 
                            physics: !isFixed, 
                            // value: isFixed ? 25 : 15, // 🔥 功能修改：所有节点大小统一
                            size: 20, // 统一尺寸，像电路上的触点

                            // 🔥 视觉修改：节点视觉完全还原图片中的霓虹青色发光
                            color: {
                                background: isFixed ? 'rgba(0, 229, 255, 0.1)' : 'rgba(33, 38, 45, 0.4)', // 透明感内衬
                                border: isFixed ? '#00e5ff' : '#006064', // 固定节点高亮，普通节点低亮青
                                hover: { background: 'rgba(0, 229, 255, 0.3)', border: '#00e5ff' },
                                highlight: { background: 'rgba(0, 229, 255, 0.2)', border: '#00e5ff' }
                            },
                            font: { color: isFixed ? '#fff' : '#607d8b' } // 固定节点文字全白，普通节点文字偏灰
                        });

                        if (meta.connections && Array.isArray(meta.connections)) {
                            meta.connections.forEach(targetId => {
                                // 功能修改：箭头反转 (from target to self)
                                edges.add({ 
                                    from: targetId, 
                                    to: meta.id || file, 
                                    arrows: 'to',
                                    // 🔥 视觉修改：极细、暗灰青色的电路/引力线
                                    color: { color: 'rgba(0, 150, 136, 0.15)', highlight: 'rgba(0, 229, 255, 0.8)', opacity: 0.15 },
                                });
                            });
                        }
                    } catch (yamlErr) { console.error(`${file} YAML 错误:`, yamlErr); }
                }
            }

            const container = document.getElementById('starfield');
            const options = {
                // --- 🔥 全局视觉调整 ---
                nodes: {
                    shape: 'dot',
                    font: { 
                        size: 13, 
                        face: 'Consolas, Monaco, monospace', 
                        vadjust: 30, // 文字离圆点更远一点，营造距离感
                        strokeWidth: 0,
                        align: 'center'
                    },
                    borderWidth: 1.5,
                    // 🔥 核心改动：强烈的霓虹青色发光
                    shadow: { 
                        enabled: true, 
                        color: 'rgba(0, 229, 255, 0.9)', 
                        size: 15, x: 0, y: 0 
                    }
                },
                edges: {
                    smooth: false, // 功能修改：硬直线连线
                    width: 1,    // 🔥 极细线条
                    arrows: { to: { enabled: true, scaleFactor: 0.3 } }, // 🔥 极小箭头，防止破坏极简几何感
                    hoverWidth: 1.5
                },
                physics: {
                    enabled: true,
                    solver: 'barnesHut',
                    barnesHut: {
                        gravitationalConstant: -10000, 
                        centralGravity: 0.1, 
                        springLength: 300, 
                        springConstant: 0.04 
                    },
                    stabilization: { iterations: 150, updateInterval: 25 }
                },
                interaction: { hover: true, dragNodes: true, navigationButtons: false } // 关闭自带的导航按钮，使用自定义
            };

            network = new vis.Network(container, { nodes, edges }, options);
            // 当星图第一次自动排布好后执行
            network.once("stabilizationIterationsDone", function() {
                const allIds = nodes.getIds();
                const pos = network.getPositions(allIds);
                
                allIds.forEach(id => {
                    const nodeData = nodes.get(id);
                    // 🔥 检查：如果不是蓝色边框（即不是固定节点），就加入摆动队列
                    if (nodeData.color.border !== '#00e5ff') {
                        basePositions[id] = { x: pos[id].x, y: pos[id].y }; // 记录老家
                        wobblingNodes.add(id); // 加入摆动名单
                        nodes.update({ id: id, fixed: true }); // 必须固定，否则会跟动画冲突
                    }
                });
                network.fit({ animation: { duration: 1500 } });
            });

            // --- 功能逻辑部分与之前完全一致 ---

            // A. 开始拖拽
            network.on("dragStart", (params) => {
                if (params.nodes.length > 0) {
                    draggingNodeId = params.nodes[0];
                    // 拖动时临时解除固定，否则拖不动
                    nodes.update({ id: draggingNodeId, fixed: false });
                }
            });

            // B. 结束拖拽
            network.on("dragEnd", (params) => {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    const pos = network.getPositions([nodeId])[nodeId];
                    const nodeData = nodes.get(nodeId);

                    // 1. 先设为固定，防止物理引擎拉走
                    nodes.update({ id: nodeId, fixed: true });

                    // 2. 🔥 只有普通节点（不是蓝色那个 #00e5ff）移动后开启摆动
                    if (nodeData.color.border !== '#00e5ff') {
                        basePositions[nodeId] = { x: pos.x, y: pos.y };
                        wobblingNodes.add(nodeId);
                    }
                    
                    draggingNodeId = null; 
                }
            });

            // C. 点击打开笔记
            network.on("click", (e) => {
                if (e.nodes.length > 0) {
                    const node = nodes.get(e.nodes[0]);
                    openNote(node.file);
                } else {
                    togglePanel(false);
                }
            });

            animate(); // 启动摆动循环

        } catch (err) { console.error("崩溃:", err); }
    }

    // --- 摆动动画引擎 (功能逻辑未变，只有 amplitude 调小了，更符合 Submachine 的静谧感) ---
    function animate() {
        wobbleStep += 0.04;
        const amplitude = 10.0; // 调小摆动幅度
        const updates = [];

        wobblingNodes.forEach(nodeId => {
            // 只有【没在被拽】且【有基准坐标】且【非原本就固定】的才更新
            if (nodeId !== draggingNodeId && basePositions[nodeId]) {
                updates.push({
                    id: nodeId,
                    x: basePositions[nodeId].x + Math.sin(wobbleStep) * amplitude,
                    y: basePositions[nodeId].y + Math.cos(wobbleStep * 0.8) * amplitude
                });
            }
        });

        if (updates.length > 0) { nodes.update(updates); }
        requestAnimationFrame(animate);
    }

    // --- 辅助函数 ---
    async function openNote(fileName) {
        const res = await fetch(`./notes/${fileName}`);
        const text = await res.text();
        const body = text.replace(/^---\r?\n[\s\S]+?\r?\n---/, ''); // 剔除元数据
        document.getElementById('mdContent').innerHTML = marked.parse(body);
        togglePanel(true);
        document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    }

    function togglePanel(show) { document.getElementById('sidePanel').className = show ? 'active' : ''; }
    function resetCamera() {
        if (firstNodeId && network) {
            network.focus(firstNodeId, {
                scale: 0.8, // 缩放比例，数字越大离得越近
                animation: {
                    duration: 1000,
                    easingFunction: 'easeInOutQuad'
                }
            });
        } else {
            // 如果找不到核心，则回退到全屏适应
            network.fit({ animation: { duration: 1000 } });
        }
    }

    startEngine();
    </script>
</body>
</html>
