<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI Knowledge Starfield - Legacy Edition</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/lib/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">

    <style>
        body { margin: 0; background: #06080b; color: #fff; overflow: hidden; font-family: 'Consolas', 'Monaco', 'monospace', sans-serif; }
        
        /* 🔥 视觉调整：更深邃的 Submachine 风格径向渐变背景 */
        #starfield { 
            width: 100vw; height: 100vh; 
            background: radial-gradient(circle at center, #10151c 0%, #030406 100%);
        }

        /* 游戏化 UI 控件 */
        .controls { position: fixed; left: 20px; bottom: 20px; z-index: 100; display: flex; gap: 10px; }
        .btn { 
            background: rgba(0,255,255,0.02); border: 1px solid rgba(0,255,255,0.1); 
            color: #4db6ac; padding: 10px 20px; border-radius: 4px; cursor: pointer; /* 去掉大圆角，改为 Submachine 风格小圆角 */
            backdrop-filter: blur(5px); transition: all 0.3s;
            font-size: 13px;
        }
        .btn:hover { background: rgba(0, 255, 255, 0.1); border-color: #00e5ff; color: #fff; text-shadow: 0 0 5px #00e5ff; }

        /* 侧边笔记面板 */
        #sidePanel { 
            position: fixed; right: -500px; top: 0; width: 450px; height: 100%;
            background: rgba(6, 10, 15, 0.9); backdrop-filter: blur(15px);
            border-left: 1px solid rgba(0,255,255,0.05); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }
        #sidePanel.active { right: 0; }
        .markdown-body { padding: 40px; height: 100%; overflow-y: auto; background: transparent !important; color: #a3b3bf !important; font-size: 14px; }
        .close-btn { position: absolute; top: 20px; left: -40px; background: #06080b; padding: 10px; cursor: pointer; border-radius: 4px 0 0 4px; border: 1px solid rgba(0,255,255,0.1); color: #4db6ac; }
        .close-btn:hover { color: #fff; border-color: #00e5ff; }
    </style>
</head>
<body>

    <div id="starfield"></div>

    <div class="controls">
        <button class="btn" onclick="resetCamera()">[🎯] RE-CENTER</button>
        <button class="btn" onclick="location.reload()">[🔄] UPDATE MAP</button>
    </div>

    <div id="sidePanel">
        <div class="close-btn" onclick="togglePanel(false)">✕</div>
        <div id="mdContent" class="markdown-body"></div>
    </div>

    <script>
    let network = null;
    let nodes = new vis.DataSet();
    let edges = new vis.DataSet();
    let firstNodeId = null; 
    const contentCache = {}; 

    const basePositions = {};    
    const wobblingNodes = new Set(); 
    let draggingNodeId = null;   
    let wobbleStep = 0;

    async function startEngine() {
        try {
            const res = await fetch('data.md');
            if (!res.ok) throw new Error('无法加载 data.md');
            const fullText = await res.text();

            const sections = fullText.split('###---').filter(s => s.trim());

            sections.forEach((section, index) => {
                const separatorIndex = section.indexOf('---');
                if (separatorIndex !== -1) {
                    const yamlPart = section.substring(0, separatorIndex).trim();
                    const bodyPart = section.substring(separatorIndex + 3).trim();

                    try {
                        const meta = jsyaml.load(yamlPart);
                        const nodeId = meta.id || `node_${index}`;
                        const isFixed = meta.status === 'fixed';
                        
                        const contentLength = bodyPart.length;
                        // 设定基础大小为 25
                        // 使用 Math.sqrt (平方根) 让大小增长得更平滑，不至于内容一多就变得巨大
                        // 这里的 2 是调节系数，你可以根据喜好调整
                        const dynamicSize = 20 + Math.sqrt(contentLength) * 2;


                        if (index === 0) firstNodeId = nodeId;
                        contentCache[nodeId] = bodyPart;

                        nodes.add({
                            id: nodeId,
                            label: meta.label || nodeId,
                            fixed: isFixed,
                            physics: !isFixed,
                            size: dynamicSize,
                            isFloating: !isFixed,
                            initialPos:{x: 0, y: 0},
                            color: {
                                background: isFixed ? 'rgba(13,59,69,100)' : 'rgba(16,70,79,100)',
                                border: isFixed ? '#00e5ff' : '#006064',
                                hover: { background: 'rgba(5,119,134,100)', border: '#00e5ff' },
                                highlight: { background: 'rgba(0, 190, 200, 1)', border: '#00e5ff' }
                            },
                            font: { color: isFixed ? '#fff' : '#808d9b' }
                        });

                        if (meta.connections && Array.isArray(meta.connections)) {
                            meta.connections.forEach(targetId => {
                                edges.add({
                                    from: targetId,
                                    to: nodeId,
                                    arrows: 'to',
                                    color: { color: 'rgba(0, 200, 200, 0.6)',hover:'rgba(0,190,190,1)',highlight:'rgba(0,180,180,1)', opacity: 0.15 }
                                });
                            });
                        }
                    } catch (e) {
                        console.error("YAML 解析出错:", e);
                    }
                }
            });

            if (nodes.length > 0) {
                initNetwork(); 
            } else {
                console.warn("未解析到有效节点。");
            }
        } catch (err) {
            console.error("引擎启动失败:", err);
        }
    }

    function initNetwork() {
        const container = document.getElementById('starfield');
        const options = {
            nodes: {
                shape: 'circle',
                margin: 10,
                font: { size: 15, face: 'Consolas, monospace', vadjust: 20,color: '#fff' },
                borderWidth: 1.5,
                shadow: { enabled: true, color: 'rgba(0, 229, 255, 0.9)', size: 15 }
            },
            edges: {
                smooth: false,
                width: 1,
                arrows: { to: { enabled: true, scaleFactor: 0.3 } }
            },
            physics: {
                enabled: true,
                solver: 'barnesHut',
                barnesHut: {
                    // 1. 斥力系数：数值越小（负得越多），节点之间排斥越强。
                    // 从默认的 -2000 改为 -4000 甚至更小，能显著拉开距离。
                    gravitationalConstant: -5000, 

                    // 2. 中心引力：数值越小，节点越往外扩散，不会总想往中间挤。
                    centralGravity: 0.01, 

                    // 3. 弹簧长度：这是连线两端节点的“理想距离”。
                    // 增加这个值（比如从 100 改为 250），线会变长，布局更稀疏。
                    springLength: 250, 

                    // 4. 弹簧常数：数值越小，线越“软”，斥力就更容易把节点推开。
                    springConstant: 0.04,
                    
                    damping: 0.09,
                    avoidOverlap: 1 // 设为 1 强制避免节点重叠
                },
                stabilization: { 
                    iterations: 200, // 增加初始化计算次数，让它展开得更彻底再显示
                    updateInterval: 25 
                }
            },
            interaction: { hover: true }
        };

        network = new vis.Network(container, { nodes, edges }, options);

        // 绑定事件（必须在 network 实例化后）
        network.on("click", (e) => {
            if (e.nodes.length > 0) {
                openNote(e.nodes[0]);
            } else {
                togglePanel(false);
            }
        });

        network.on("dragStart", (params) => {
            if (params.nodes.length > 0) {
                draggingNodeId = params.nodes[0];
                nodes.update({ id: draggingNodeId, fixed: false });
            }
        });

        network.on("dragEnd", (params) => {
            if (params.nodes.length > 0) {
                const nodeId = params.nodes[0];
                const pos = network.getPositions([nodeId])[nodeId];
                const nodeData = nodes.get(nodeId);
                nodes.update({ id: nodeId, fixed: true });
                if (nodeData.color.border !== '#00e5ff') {
                    basePositions[nodeId] = { x: pos.x, y: pos.y };
                    wobblingNodes.add(nodeId);
                }
                draggingNodeId = null; 
            }
        });

        network.once("stabilizationIterationsDone", function() {
            const allIds = nodes.getIds();
            const pos = network.getPositions(allIds);
            allIds.forEach(id => {
                const nodeData = nodes.get(id);
                if (nodeData.color.border !== '#00e5ff') {
                    basePositions[id] = { x: pos[id].x, y: pos[id].y };
                    wobblingNodes.add(id);
                    nodes.update({ id: id, fixed: true });
                }
            });
            network.fit({ animation: { duration: 1500 } });
        });

        animate();
    }

    function openNote(nodeId) {
        const body = contentCache[nodeId] || "未找到内容";
        document.getElementById('mdContent').innerHTML = marked.parse(body);
        togglePanel(true);
        document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    }

    function animate() {
        wobbleStep += 0.04;
        const amplitude = 10.0;
        const updates = [];
        wobblingNodes.forEach(nodeId => {
            if (nodeId !== draggingNodeId && basePositions[nodeId]) {
                updates.push({
                    id: nodeId,
                    x: basePositions[nodeId].x + Math.sin(wobbleStep) * amplitude,
                    y: basePositions[nodeId].y + Math.cos(wobbleStep * 0.8) * amplitude
                });
            }
        });
        if (updates.length > 0) { nodes.update(updates); }
        requestAnimationFrame(animate);
    }

    function togglePanel(show) { document.getElementById('sidePanel').className = show ? 'active' : ''; }
    
    function resetCamera() {
        if (firstNodeId && network) {
            network.focus(firstNodeId, { scale: 0.8, animation: { duration: 1000 } });
        } else if(network) {
            network.fit({ animation: { duration: 1000 } });
        }
    }

    startEngine();
    </script>
</body>
</html>
